name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck test build

  build-push:
    # amd64-only per iac convention: workloads run on algovn-w1, not the arm64 Pi.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: showcase-build-push
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/the-algovn/web-showcase
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/showcase/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-push-landing:
    # amd64-only per iac convention: workloads run on algovn-w1, not the arm64 Pi.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: landing-build-push
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/the-algovn/web-landing
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/landing/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-push-the-button:
    # amd64-only per iac convention: workloads run on algovn-w1, not the arm64 Pi.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: the-button-build-push
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/the-algovn/web-the-button
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/the-button/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_OIDC_CLIENT_ID=${{ vars.VITE_OIDC_CLIENT_ID || 'placeholder' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-push-console:
    # amd64-only per iac convention: workloads run on algovn-w1, not the arm64 Pi.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: console-build-push
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/the-algovn/web-console
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/console/Dockerfile
          platforms: linux/amd64
          push: true
          # NOT vars.VITE_OIDC_CLIENT_ID — that one is the-button's.
          build-args: |
            VITE_OIDC_CLIENT_ID=${{ vars.VITE_CONSOLE_OIDC_CLIENT_ID || 'placeholder' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-push-radio:
    # amd64-only per iac convention: workloads run on algovn-w1, not the arm64 Pi.
    # No build-args: radio's passive mock has no @algovn/auth / OIDC.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: radio-build-push
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/the-algovn/web-radio
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/radio/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
