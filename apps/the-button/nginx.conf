server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # TLS terminates at Cloudflare/Kong; nginx only ever sees http on this hop.
  # With the default absolute_redirect on, redirects would rebuild Location
  # from $scheme (http), downgrading the client to plaintext. Keep it off so
  # Location is relative and the browser resolves it against the https origin.
  absolute_redirect off;

  # hashed bundles: cache forever (Cloudflare cache rule targets this path)
  location /the-button/assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # entrypoint must revalidate so deploys roll out immediately
  location = /the-button/index.html {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback: client-side paths (e.g. /the-button/callback) serve the app
  location /the-button/ {
    try_files $uri $uri/ /the-button/index.html;
  }

  location = / {
    return 302 /the-button/;
  }
}
